<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <title>海上GPSビューア（地図＋天気/海況）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />

  <!-- 自分のCSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="app">

    <!-- ★ タブ -->
    <div class="tabs">
      <button id="tabMap" class="tab active">地図</button>
      <button id="tabForecast" class="tab">天気・海況</button>
    </div>

    <!-- ★ 地図画面 -->
    <div id="mapScreen" class="screen active">
      <div id="map"></div>

      <div class="controls">
        <button id="locBtn" class="btn" type="button">追従開始</button>

        <!-- ★ GPX保存ボタン（map.js が参照） -->
        <button id="saveGpxBtn" class="btn" type="button">GPX保存</button>

        <div id="status" class="status">
          位置情報の許可をすると、現在地を中心に船アイコンと軌跡が表示されます。
        </div>
      </div>
    </div>

    <!-- ★ 天気・海況画面 -->
    <div id="forecastScreen" class="screen">
      <div id="forecast" class="forecastBox">
        天気・海況データを取得中…
      </div>
    </div>

  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>

  <!-- 回転マーカー -->
  <script src="https://rawcdn.githack.com/bbecquet/Leaflet.RotatedMarker/master/leaflet.rotatedMarker.js"></script>

  <!-- ★ ES Modules として読み込む（最重要） -->
  <script type="module" src="app.js"></script>
</body>

</html>
