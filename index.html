<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <title>現在地マップ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    #map {
      flex: 1;
    }

    .controls {
      padding: 8px 12px;
      border-top: 1px solid #ddd;
      background: #f8f8f8;
    }

    .btn {
      padding: 10px 16px;
      font-size: 16px;
      border-radius: 6px;
      border: none;
      background: #0078d4;
      color: #fff;
      font-weight: 600;
    }

    .btn:disabled {
      opacity: 0.6;
    }

    .status {
      margin-top: 6px;
      font-size: 13px;
      color: #555;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <div id="app">
    <div id="map"></div>
    <div class="controls">
      <button id="locBtn" class="btn" type="button">現在地を取得して中心にする</button>
      <div id="status" class="status">位置情報の許可をすると、現在地を中心に地図が表示されます。</div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <script>
    // 初期地図（とりあえず世界地図）
    const map = L.map('map').setView([35.681236, 139.767125], 5); // 東京駅あたりを初期中心に

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);

    let marker = null;
    const statusEl = document.getElementById('status');
    const btn = document.getElementById('locBtn');

    function setStatus(msg) {
      statusEl.textContent = msg;
    }

    function centerToCurrentPosition() {
      if (!navigator.geolocation) {
        setStatus('この端末・ブラウザはGeolocation APIに対応していません。');
        return;
      }

      btn.disabled = true;
      setStatus('現在地を取得しています…');

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude;
          const lng = pos.coords.longitude;

          // マーカーを更新
          if (marker) {
            marker.setLatLng([lat, lng]);
          } else {
            marker = L.marker([lat, lng]).addTo(map);
          }

          // 地図の中心とズームを調整
          map.setView([lat, lng], 16);

          setStatus(`現在地を取得しました（緯度: ${lat.toFixed(5)}, 経度: ${lng.toFixed(5)}）。`);
          btn.disabled = false;
        },
        (err) => {
          console.error(err);
          switch (err.code) {
            case err.PERMISSION_DENIED:
              setStatus('位置情報の利用が拒否されました。ブラウザの設定で許可してください。');
              break;
            case err.POSITION_UNAVAILABLE:
              setStatus('位置情報を取得できませんでした。電波状況やGPS設定を確認してください。');
              break;
            case err.TIMEOUT:
              setStatus('位置情報の取得がタイムアウトしました。再度お試しください。');
              break;
            default:
              setStatus('位置情報の取得中に不明なエラーが発生しました。');
          }
          btn.disabled = false;
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    // ボタンで現在地取得
    btn.addEventListener('click', centerToCurrentPosition);

    // ページ表示時に一度だけ自動で現在地取得したい場合は、以下のコメントアウトを外す
    // window.addEventListener('load', centerToCurrentPosition);
  </script>
</body>

</html>
