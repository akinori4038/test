<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8" />
  <title>海上GPSビューア（現在地＋船アイコン＋天気/海況）</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

  <!-- 自分のCSS -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div id="app">
    <!-- 地図 -->
    <div id="map"></div>

    <!-- 下部コントロール（追従ボタン＋ステータス＋天気/海況） -->
    <div class="controls">
      <button id="locBtn" class="btn" type="button">追従開始</button>

      <div id="status" class="status">
        位置情報の許可をすると、現在地を中心に船アイコンと軌跡が表示されます。
      </div>

      <!-- ★ 天気＋海況の1時間予報（app.js が更新） -->
      <div id="forecast" class="status"></div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

  <!-- 回転マーカー用プラグイン -->
  <script src="https://rawcdn.githack.com/bbecquet/Leaflet.RotatedMarker/master/leaflet.rotatedMarker.js"></script>

  <!-- 自分のJS（完全統合版 app.js） -->
  <script src="app.js"></script>
</body>

</html>
